services:
  # ---------- Local mail server (IMAP + SMTP) ----------
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.example.test
    domainname: example.test
    ports:
      - "3025:25"    # SMTP
      - "3143:143"   # IMAP
      - "3587:587"   # Submission
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - maillogs:/var/log/mail
      - ./docker-data/dms/config/:/tmp/docker-mailserver/
    environment:
      # Disable heavy services not needed for dev
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - ENABLE_POSTGREY=0
      - ENABLE_AMAVIS=0
      - ENABLE_UPDATE_CHECK=0
      # No SSL for local dev (plain IMAP/SMTP)
      - SSL_TYPE=
      # Allow relay from any container on the same docker network
      - PERMIT_DOCKER=connected-networks
      - OVERRIDE_HOSTNAME=mail.example.test
      - POSTFIX_INET_PROTOCOLS=ipv4
      - DOVECOT_INET_PROTOCOLS=ipv4
      # Accept mail without strict hostname checks
      - ENABLE_SRS=0
    restart: unless-stopped
    healthcheck:
      # Gate on submission (587) and IMAP (143) — ports Roundcube actually connects to
      test: ss -lnt | grep -q ':587' && ss -lnt | grep -q ':143' || exit 1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  # ---------- Roundcube webmail ----------
  roundcube:
    build:
      context: .
      dockerfile: Dockerfile.roundcube
    container_name: roundcube-dev
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      # Roundcube source (git clone on host — symlinks for skins/plugins already inside)
      - ../roundcubemail:/var/www/html:delegated
      # Live Roundcube config from repo (edit docker/config/roundcube.config.inc.php in realtime)
      - ./config/custom.inc.php:/var/www/html/config/config.inc.php
      # Resolve Roundcube symlinks like ../../plugins/* and ../../skins/* from /var/www/html
      - ../plugins:/var/www/plugins:delegated
      - ../skins:/var/www/skins:delegated
      # Persist SQLite database on host
      - ./db/sqlite:/var/roundcube/db
      # Logs
      - ./logs:/var/roundcube/logs
      # Custom PHP settings (upload limits, timezone, etc.)
      - ./roundcube.ini:/usr/local/etc/php/conf.d/zzz_roundcube-custom.ini
      # Composer cache (speeds up rebuilds)
      - composer-cache:/root/.composer
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    depends_on:
      mailserver:
        condition: service_healthy
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
volumes:
  maildata:
  mailstate:
  maillogs:
  composer-cache:
