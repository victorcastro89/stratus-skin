services:
  # ---------- Local mail server (IMAP + SMTP) ----------
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.example.test
    domainname: example.test
    ports:
      - "3025:25"    # SMTP
      - "3143:143"   # IMAP
      - "3587:587"   # Submission
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - maillogs:/var/log/mail
      - ./docker-data/dms/config/:/tmp/docker-mailserver/
    environment:
      # Disable heavy services not needed for dev
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - ENABLE_POSTGREY=0
      - ENABLE_AMAVIS=0
      - ENABLE_UPDATE_CHECK=0
      # No SSL for local dev (plain IMAP/SMTP)
      - SSL_TYPE=
      # Allow relay from any container on the same docker network
      - PERMIT_DOCKER=connected-networks
      - OVERRIDE_HOSTNAME=mail.example.test
      - POSTFIX_INET_PROTOCOLS=ipv4
      - DOVECOT_INET_PROTOCOLS=ipv4
      # Accept mail without strict hostname checks
      - ENABLE_SRS=0
    restart: unless-stopped
    healthcheck:
      # Gate on submission (587) and IMAP (143) — ports Roundcube actually connects to
      test: ss -lnt | grep -q ':587' && ss -lnt | grep -q ':143' || exit 1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  # ---------- Roundcube webmail ----------
  roundcube:
    image: roundcube/roundcubemail:latest-apache
    container_name: roundcube-dev
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      # Persist web root on host (Roundcube source + composer-installed plugins).
      # The official entrypoint copies /usr/src/roundcubemail/ here on first start.
      - ./www:/var/www/html
      # Our custom skin (bind mount overlays the persisted web root)
      - ../skins/stratus:/var/www/html/skins/stratus:delegated
      # To mount custom plugins, add bind mounts here, e.g.:
      #- ../plugins/my_plugin:/var/www/html/plugins/my_plugin:delegated

      # Persist config on host for easy editing (overlays default config in image)
      - ./config/:/var/roundcube/config/ 
      # Persist SQLite database on host
      - ./db/sqlite:/var/roundcube/db
      # Custom PHP settings (upload limits, timezone, etc.)
      - ./roundcube.ini:/usr/local/etc/php/conf.d/zzz_roundcube-custom.ini:ro
    depends_on:
      mailserver:
        condition: service_healthy
    environment:
      # All values sourced from .env
      - ROUNDCUBEMAIL_DEFAULT_HOST
      - ROUNDCUBEMAIL_DEFAULT_PORT
      - ROUNDCUBEMAIL_SMTP_SERVER
      - ROUNDCUBEMAIL_SMTP_PORT
      - ROUNDCUBEMAIL_DB_TYPE
      - ROUNDCUBEMAIL_SKIN
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
      - ROUNDCUBEMAIL_PRODUCT_NAME
      - ROUNDCUBEMAIL_SUPPORT_URL
      # Install plugins via Composer on container start (idempotent — skipped if already present)
      # - ROUNDCUBEMAIL_COMPOSER_PLUGINS=kolab/calendar,roundcube/carddav
      # - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload,emoticons,identicon,jqueryui,markasjunk,newmail_notifier,hide_blockquote,attachment_reminder,vcard_attachments,libcalendaring,calendar,carddav
      - ROUNDCUBEMAIL_COMPOSER_PLUGINS
      - ROUNDCUBEMAIL_PLUGINS
volumes:
  maildata:
  mailstate:
  maillogs:
