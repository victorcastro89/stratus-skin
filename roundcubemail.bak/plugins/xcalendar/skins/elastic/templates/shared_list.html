<div id="shared-calendar-controller" ng-controller="SharedCalendarController" ng-init="initialize()" xmlns:roundcube="http://www.w3.org/1999/xhtml">
    <div class='editor uibox' ng-class="{ loading: loading }" ng-show="editing" ng-cloak>
        <roundcube:if condition="env:xelastic" />
        <h2 class='editor-title'>
            <span><roundcube:label name="xcalendar.shared_calendars" /></span>
        </h2>
        <roundcube:else />
        <h2 class='boxtitle'>
            <span><roundcube:label name="xcalendar.shared_calendars" /></span>
        </h2>
        <roundcube:endif />

        <div class='content-box' ng-hide='loading'>
            <div ng-show='!list.length'>
                <roundcube:label name="xcalendar.no_shared_calendars" />
            </div>

            <table class='edit-table shared-list-table' ng-show='list.length'>
                <thead>
                    <tr>
                        <th><roundcube:label name="xcalendar.calendar_name" /></th>
                        <th><roundcube:label name="xcalendar.calendar_owner" /></th>
                        <th><roundcube:label name="xcalendar.shared_date" /></th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat='item in list'>
                        <td>{{item.calendar_name}}</td>
                        <td>{{item.username}}</td>
                        <td>{{item.created_at}}</td>
                        <td class='actions'>
                            <button type="button" class="btn btn-xs btn-primary"
                                    ng-class="{busy:action.type == 'add' && action.id == item.calendar_id}"
                                    ng-click='add(item.calendar_id)'
                                    ng-show='!item.added'>
                                <span><roundcube:label name="xcalendar.add" /></span>
                            </button>
                            <button type="button" class="btn btn-xs btn-secondary"
                                    ng-class="{busy:action.type == 'remove' && action.id == item.calendar_id}"
                                    ng-click='remove(item.calendar_id)'
                                    ng-show='item.added'>
                                <span><roundcube:label name="xcalendar.remove" /></span>
                            </button>
                            <button type="button" class="btn btn-xs btn-danger"
                                    ng-class="{busy:action.type == 'unshare' && action.id == item.calendar_id}"
                                    ng-click='unshare(item.calendar_id, $index)'
                                    ng-show='!item.added'>
                                <span><roundcube:label name="xcalendar.unshare" /></span>
                            </button>
                            <span ng-show='sending == item.calendar_id' class='xspinner'></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class='formbuttons editor-button-bar' ng-hide='loading'>
            <div>
                <input type='button' class='button mainaction' ng-click='cancel()' value='<roundcube:label name="close" />'>
            </div>
        </div>
    </div>
</div>
