<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
    <meta charset="UTF-8">
    <title>[~subject~]</title>
    <style>
        body {
            background: #eee;
            color: #333;
            font-size: 14px;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            height: 100% !important;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 20px;
            -ms-text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
            width: 100% !important;
            line-height: 1.5em;
            box-sizing: border-box;
        }
        a {
            color: #1162a7;
        }
        #page {
            display: block;
            max-width: 600px;
            width: auto !important;
            margin: 20px auto 0 auto;
            padding: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        h3 {
            font-size: 18px;
            margin: 0;
            padding: 12px 0;
            text-align: center;
            color: #fff;
            background: #0075c8;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }
        #content {
            padding: 20px;
        }
        table {
            margin: 0;
        }
        table td {
            padding: 3px 0;
        }
        .label {
            color: #888;
            padding-right: 15px;
        }
    </style>
</head>
<body>
    <div id='page'>
        <h3>[~subject~]</h3>
        <div id='content'>
            <table>[~rows~]</table>
        </div>
    </div>
</body>
</html>
