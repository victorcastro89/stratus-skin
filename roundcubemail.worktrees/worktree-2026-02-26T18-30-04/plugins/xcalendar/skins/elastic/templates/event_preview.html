<div id='event-preview-controller' ng-controller="EventPreviewController" ng-init="initialize()"
     xmlns:roundcube="http://www.w3.org/1999/xhtml">

    <div class='restore-popup animation-fade' ng-show='restoreId' ng-cloak>
        <roundcube:label name="xcalendar.event_removed" />
        <a href='#' ng-click='restore()' class="undo"><roundcube:label name="undo" /></a>
        <a href='#' ng-click='hideRestore()' class='hide-popup'></a>
    </div>

    <div id='event-preview' class='animate-fade' ng-show='visible' ng-click="innerClick = true" ng-cloak>
        <div ng-show="data.error">
            <p><roundcube:label name="xcalendar.unable_to_retrieve_calendar_data" /></p>
        </div>
        <div id="event-preview-busy" ng-show="(loading || disabled()) && !data.error">
            <span class="xspinner"></span>
        </div>
        <div ng-show='!loading && !data.error'>
            <h3>
                <span class="title">{{ data.title }}</span>
                <span class="close" ng-click="visible = false">&times;</span>
            </h3>

            <table>
                <tbody>
                    <tr>
                        <td class="title"><roundcube:label name="xcalendar.start" /></td>
                        <td class="value">{{ data.start }}</td>
                    </tr>
                    <tr ng-hide='!data.end'>
                        <td class="title"><roundcube:label name="xcalendar.end" /></td>
                        <td class="value">{{ data.end }}</td>
                    </tr>
                    <tr ng-show='data.location'>
                        <td class=""><roundcube:label name="xcalendar.location" /></td>
                        <td class="value">
                            <a href='{{ data.location }}' target='_blank' rel='noopener' ng-if="data.locationIsLink">
                                {{ data.location }}</a>
                            <span ng-if="!data.locationIsLink">{{ data.location }}</span>
                        </td>
                    </tr>
                    <tr ng-show='data.url'>
                        <td class="title"><roundcube:label name="xcalendar.url" /></td>
                        <td class="value">
                            <a href='{{ data.url }}' target='_blank' rel='noopener' ng-if="data.urlIsLink">{{ data.url }}</a>
                            <span ng-if="!data.urlIsLink">{{ data.url }}</span>
                        </td>
                    </tr>
                    <tr ng-show="data.email">
                        <td class="title"><roundcube:label name="email" /></td>
                        <td class="value">
                            <a href="javascript:void(0)" ng-click="compose(data.email)" title="{{data.email}}">{{data.email}}</a>
                        </td>
                    </tr>
                    <tr ng-show="data.calendar_name">
                        <td class="title"><roundcube:label name="xcalendar.calendar" /></td>
                        <td class="value">{{ data.calendar_name }}</td>
                    </tr>
                    <tr ng-show="data.has_attendees">
                        <td class="title"><roundcube:label name="xcalendar.attendance" /></td>
                        <td class="value">{{ getAttendanceString() }}</td>
                    </tr>
                    <tr ng-show="data.show_attendance_response && data.can_edit">
                        <td class="title"><roundcube:label name="xcalendar.attendance_going" /></td>
                        <td class="value attendance-response">
                            <a href="javascript:void(0)" ng-click="setAttendanceStatus(1)"
                               ng-hide="data.attendance_status == 1"><roundcube:label name="xcalendar.attendee_status_yes" /></a>
                            <span ng-show="data.attendance_status == 1"><roundcube:label name="xcalendar.attendee_status_yes" /></span>

                            <a href="javascript:void(0)" ng-click="setAttendanceStatus(2)"
                               ng-hide="data.attendance_status == 2"><roundcube:label name="xcalendar.attendee_status_no" /></a>
                            <span ng-show="data.attendance_status == 2"><roundcube:label name="xcalendar.attendee_status_no" /></span>

                            <a href="javascript:void(0)" ng-click="setAttendanceStatus(3)"
                               ng-hide="data.attendance_status == 3"><roundcube:label name="xcalendar.attendee_status_maybe" /></a>
                            <span ng-show="data.attendance_status == 3"><roundcube:label name="xcalendar.attendee_status_maybe" /></span>
                        </td>
                    </tr>
                    <tr ng-if="(data.description && data.description.length < 30) || data.descriptionIsLink">
                        <td class="title"><roundcube:label name="xcalendar.description" /></td>
                        <td class="value">
                            <a href='{{ data.description }}' target='_blank' rel='noopener' ng-if="data.descriptionIsLink">
                                {{ data.description }}</a>
                            <span ng-if="!data.descriptionIsLink">{{ data.description }}</span>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class='description-container' ng-if="data.description && data.description.length >= 30 && !data.descriptionIsLink">
                <div class="title"><roundcube:label name="xcalendar.description" /></div>
                <div class="value" ng-bind-html="data.description | html"></div>
            </div>

            <div class='formbuttons' ng-show='data.can_edit'>
                <!--setting height and width and removing style=display:none prevents modsecurity's error: Possibly malicious iframe tag-->
                <iframe id="event-download-frame" class='download-frame' height="30" width="30"></iframe>

                <button type='button' class='btn btn-primary' ng-click='edit()'>
                    <roundcube:label name="edit" />
                </button>

                <button type='button' class='button button-options btn btn-secondary' data-popup='event-options'
                        onclick="xframework.showLarryPopup('event-options', event)">
                    <roundcube:label name="options" />
                </button>

                <div id='event-options' class='popupmenu'>
                    <ul class='toolbarmenu' role='menu' ng-class='{listing:elastic}'>
                        <li role='menuitem'>
                            <a href='#' role='button' class='active' onclick="xscope('EventPreviewController').download()">
                                <roundcube:label name="download" />
                            </a>
                        </li>
                        <li role='menuitem'>
                            <a href='#' role='button' class='active' onclick="xscope('EventPreviewController').send()">
                                <roundcube:label name="send" />
                            </a>
                        </li>
                    </ul>
                </div>

                <button type='button' class='btn btn-danger button-remove button-right' ng-click='remove(false)'
                        ng-show="!loading && !data.repeat.freq">
                    <roundcube:label name="delete" />
                </button>

                <button type='button' class='btn btn-danger button-remove-repeated button-right' ng-show="!loading && data.repeat.freq"
                        data-popup='remove-options'
                        onclick="xframework.showLarryPopup('remove-options', event);">
                    <roundcube:label name="delete" />
                </button>

                <div id='remove-options' class='popupmenu'>
                    <ul class='toolbarmenu' role='menu' ng-class='{listing:elastic}'>
                        <li role='menuitem'>
                            <a href='#' role='button' class='active' onclick="xscope('EventPreviewController').remove(true)">
                                <roundcube:label name="xcalendar.remove_one" />
                            </a>
                        </li>
                        <li role='menuitem'>
                            <a href='#' role='button' class='active' onclick="xscope('EventPreviewController').remove(false)">
                                <roundcube:label name="xcalendar.remove_all" />
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
