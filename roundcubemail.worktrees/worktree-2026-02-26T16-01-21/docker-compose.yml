version: '3.8'

services:
  roundcube:
    build: .
    container_name: roundcube-dev
    ports:
      - "8000:80"
    volumes:
      # Mount the entire application for live reloading
      - ./:/var/www/html:delegated
      # Mount skins directory for skin development with live reloading
      - ./skins:/var/www/html/skins:delegated
      # Mount config directory
      - ./config:/var/www/html/config:delegated
      # Mount plugins directory
      - ./plugins:/var/www/html/plugins:delegated
      # Persistent temp and logs (optional - can be excluded for clean restarts)
      - roundcube-temp:/var/www/html/temp
      - roundcube-logs:/var/www/html/logs
    environment:
      # PHP development settings
      - PHP_IDE_CONFIG=serverName=roundcube-docker
      # Database settings (using SQLite for simplicity in dev)
      - ROUNDCUBE_DB_TYPE=sqlite
      - ROUNDCUBE_DB_NAME=/var/www/html/temp/roundcube.db
    working_dir: /var/www/html
    command: >
      bash -c "
        # Ensure proper permissions
        chown -R www-data:www-data /var/www/html/temp /var/www/html/logs;
        
        # Install dependencies if not present
        if [ ! -d 'vendor' ]; then
          echo 'Installing PHP dependencies...';
          composer install --no-interaction;
        fi;
        
        # Create config if not exists
        if [ ! -f 'config/config.inc.php' ]; then
          echo 'Creating initial config...';
          cp config/config.inc.php.sample config/config.inc.php;
          chown www-data:www-data config/config.inc.php;
        fi;
        
        # Initialize database if needed
        if [ ! -f '/var/www/html/temp/roundcube.db' ]; then
          echo 'Initializing database...';
          php bin/initdb.sh --dir=SQL || true;
        fi;
        
        echo '========================================';
        echo 'Roundcube Development Server Started';
        echo 'Access at: http://localhost:8000';
        echo 'Live reloading enabled for:';
        echo '  - Skins (./skins)';
        echo '  - Plugins (./plugins)';
        echo '  - Config (./config)';
        echo '========================================';
        
        # Start Apache in foreground
        apache2-foreground
      "

  # Optional: Database service if you prefer MySQL/PostgreSQL
  # Uncomment below if you want to use MySQL instead of SQLite
  # db:
  #   image: mysql:8.0
  #   container_name: roundcube-db
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: roundcubemail
  #     MYSQL_USER: roundcube
  #     MYSQL_PASSWORD: roundcube
  #   volumes:
  #     - db-data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"

volumes:
  roundcube-temp:
  roundcube-logs:
  # db-data:  # Uncomment if using MySQL
