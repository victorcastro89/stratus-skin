<div class='xformatting'>
    <span class='group layout' ng-if='data.format.[~item~].hasOwnProperty("layout")'>
        <select name='xsignature_format[[~item~]][layout]' ng-model='data.format.[~item~].layout'>
            <option value='column'>[+xsignature.column+]</option>
            <option value='row'>[+xsignature.row+]</option>
        </select>
    </span>
    <span class='group checkboxes' ng-if='data.format.[~item~].hasOwnProperty("bold")'>
        <input type="checkbox" class='no-switchbox' id="xfb-[~item~]" name='xsignature_format[[~item~]][bold]' value='true' ng-model='data.format.[~item~].bold'>
        <label for="xfb-[~item~]" class='first format-label' ng-class="{checked:data.format.[~item~].bold}">
            <span class='format-button button-bold'>B</span>
        </label>
        <input type="checkbox" class='no-switchbox' id="xfi-[~item~]" name='xsignature_format[[~item~]][italic]' value='true' ng-model='data.format.[~item~].italic'>
        <label for="xfi-[~item~]" class="format-label" ng-class="{checked:data.format.[~item~].italic}">
            <span class='format-button button-italic'>I</span>
        </label>
        <input type="checkbox" class='no-switchbox' id="xfu-[~item~]" name='xsignature_format[[~item~]][underline]' value='true' ng-model='data.format.[~item~].underline'>
        <label for="xfu-[~item~]" class='last format-label' ng-class="{checked:data.format.[~item~].underline}">
            <span class='format-button button-underline'>U</span>
        </label>
    </span>
    <span class='group radioboxes' ng-if='data.format.[~item~].hasOwnProperty("align") && data.format.[~item~].layout == "column"'>
        <input type='radio' class='no-switchbox' id='xfl-[~item~]' name='xsignature_format[[~item~]][align]' value='left' ng-model='data.format.[~item~].align'>
        <label for='xfl-[~item~]' class='first format-label' ng-class="{checked:data.format.[~item~].align=='left'}">
            <span class='format-button button-align-left'></span>
        </label>
        <input type='radio' class='no-switchbox' id='xfc-[~item~]' name='xsignature_format[[~item~]][align]' value='center' ng-model='data.format.[~item~].align'>
        <label for='xfc-[~item~]' class="format-label" ng-class="{checked:data.format.[~item~].align=='center'}">
            <span class='format-button button-align-center'></span>
        </label>
        <input type='radio' class='no-switchbox' id='xfr-[~item~]' name='xsignature_format[[~item~]][align]' value='right' ng-model='data.format.[~item~].align'>
        <label for='xfr-[~item~]' class='last format-label' ng-class="{checked:data.format.[~item~].align=='right'}">
            <span class='format-button button-align-right'></span>
        </label>
    </span>
</div>
